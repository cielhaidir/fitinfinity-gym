# ACL Configuration for FitInfinity MQTT
# User: fitinfinity_mqtt has full access to all fitinfinity topics

user fitinfinity_mqtt
topic readwrite fitinfinity/#
topic readwrite $SYS/#

# Default permissions for authenticated users
pattern readwrite fitinfinity/devices/%u/#
pattern readwrite fitinfinity/admin/%u/#

# System topics - read only for monitoring
topic read $SYS/broker/uptime
topic read $SYS/broker/clients/connected
topic read $SYS/broker/clients/disconnected
topic read $SYS/broker/messages/sent
topic read $SYS/broker/messages/received