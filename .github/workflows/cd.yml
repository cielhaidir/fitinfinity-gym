name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
    - name: Force clean repo
      run: |
        rm -rf /development/fitinfinity/.git
        git clone https://github.com/cielhaidir/fitinfinity-gym.git /development/fitinfinity

      - name: Pull latest code
        run: |
          cd /development/fitinfinity
          git pull

      - name: Write .env
        run: |
          echo "${{ secrets.PROD_ENV }}" > /development/fitinfinity/.env

      - name: Stop old containers
        run: |
          cd /development/fitinfinity
          COMPOSE_PROJECT_NAME=fitinfinity-prod docker compose -f docker-compose.yml down

      - name: Build and restart containers
        run: |
          cd /development/fitinfinity
          COMPOSE_PROJECT_NAME=fitinfinity-prod docker compose -f docker-compose.yml up -d --build

      - name: Clean up dangling images
        run: docker image prune -f

      - name: Verify deployment
        run: |
          sleep 10
          APP_URL="${{ secrets.APP_URL }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/health" || true)
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Deployment successful — HTTP $HTTP_STATUS"
          else
            echo "⚠️  Health check returned HTTP $HTTP_STATUS (may still be starting)"
          fi
