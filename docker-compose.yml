services:
  db:
    image: postgres:15
    container_name: fitinfinity-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd_db_f1n1t3
      POSTGRES_DB: fitinfinity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: fitinfinity
    container_name: fitinfinity-app
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3099:3000"
    env_file:
      - .env

  seed:
    image: fitinfinity
    container_name: fitinfinity-seed
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    user: root
    command: ["sh", "-c", "prisma migrate deploy && tsx prisma/seed.ts"]
    profiles:
      - seed

volumes:
  postgres_data:
